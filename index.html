<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藍藻菌 - 質感一頁式網頁</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入 Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scroll-container">
        <!-- 每一頁是一張投影片 (Slide) -->
        <section class="slide" id="slide-1">
            <img src="assets/page_01.jpg" alt="藍藻菌內容 第一頁">
        </section>
        <section class="slide" id="slide-2">
            <img src="assets/page_02.jpg" alt="藍藻菌內容 第二頁">
        </section>
        <section class="slide" id="slide-3">
            <img src="assets/page_03.jpg" alt="藍藻菌內容 第三頁">
        </section>
        <section class="slide" id="slide-4">
            <img src="assets/page_04.jpg" alt="藍藻菌內容 第四頁">
        </section>
        <section class="slide" id="slide-5">
            <img src="assets/page_05.jpg" alt="藍藻菌內容 第五頁">
        </section>
        <section class="slide" id="slide-6">
            <img src="assets/page_06.jpg" alt="藍藻菌內容 第六頁">
        </section>

        <!-- 底部 LINE 聯絡按鈕 -->
        <div class="cta-section">
            <a href="https://line.me/R/oaMessage/@478ihlka/?%E6%83%B3%E8%A6%81%E4%BA%86%E8%A7%A3%E8%97%8D%E8%97%BB%E8%8F%8C" class="line-btn" target="_blank">
                <span class="icon">💬</span>
                點我加 LINE 了解藍藻菌
            </a>
        </div>
    </div>

    <!-- 提示往下滑的浮動指標 -->
    <div class="scroll-indicator">
        <div class="mouse">
            <div class="wheel"></div>
        </div>
        <p>往下滑動</p>
    </div>
</body>
</html>
